<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1410" />
  <title>Conan Exiles Character Planner</title>
  <link rel="stylesheet" href="styles.css?v=13" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="overline">Conan Exiles · Character Planner</div>

      <button id="build-identity" class="build-identity" type="button" aria-haspopup="dialog" aria-label="Switch build">
        <span id="bi-icon" class="build-identity-icon"></span>
        <span id="bi-name" class="build-name">Untitled</span>
      </button>

      <div class="header-controls">
        <div class="ap-counter" aria-live="polite">
          <span id="ap-spent">0</span><span class="ap-sep">/</span><span class="ap-max">60</span>
          <span class="ap-label">points</span>
        </div>
        <div class="header-actions">
          <button id="share-btn" type="button" class="header-btn" aria-label="Copy shareable link">Share</button>
          <button id="reset-btn" type="button" class="header-btn" aria-label="Reset all points">Reset</button>
        </div>
      </div>

      <nav id="tab-bar" class="tab-bar" role="tablist" aria-label="View"></nav>
    </div>
  </header>

  <main class="app-main">
    <section id="overview-panel" class="panel" role="tabpanel" aria-label="Overview"></section>
    <section id="abilities-panel" class="panel" role="tabpanel" aria-label="Abilities">
      <div id="attributes" class="attributes-grid"></div>
    </section>
  </main>

  <footer class="app-footer">
    <p>Data from the <a href="https://conanexiles.fandom.com/wiki/Attribute" target="_blank" rel="noopener">Conan Exiles wiki</a>. Builds are saved in this browser.</p>
  </footer>

  <div id="sheet-scrim" class="sheet-scrim"></div>
  <aside id="builds-sheet" class="builds-sheet" role="dialog" aria-modal="true" aria-label="Your builds"></aside>

  <script src="icons.js?v=13"></script>
  <script src="data.js?v=13"></script>
  <script src="app.js?v=13"></script>
</body>
</html>
